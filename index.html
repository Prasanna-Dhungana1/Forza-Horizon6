const CLASS_ORDER = ["D", "C", "B", "A", "S1", "S2", "R"];
const BUILD_TYPES = ["Race", "Drift", "Top Speed", "Off-Road", "Rally"];

const BUILD_META = {
  Race: { icon: "🏁", blurb: "Balanced road-racing grip, braking stability, and corner exit speed." },
  Drift: { icon: "💨", blurb: "Angle, throttle control, rear rotation, and predictable transitions." },
  "Top Speed": { icon: "⚡", blurb: "Long gearing, low drag, stable aero, and maximum power priority." },
  "Off-Road": { icon: "⛰️", blurb: "Suspension travel, traction, durability, and dirt launch control." },
  Rally: { icon: "🌧️", blurb: "Mixed-surface grip with sharper turn-in than a full off-road build." },
};

function classColor(cls) {
  return CLASS_RANGES[cls]?.color || "#94a3b8";
}

function nextClassesFrom(cls) {
  const i = Math.max(0, CLASS_ORDER.indexOf(cls));
  return CLASS_ORDER.slice(i).filter(c => c !== "R" || ["R", "S2", "S1"].includes(cls));
}

function recommendedTarget(car, build) {
  if (build === "Drift") return car.classNum >= 800 ? "S2" : car.classNum >= 650 ? "S1" : "A";
  if (build === "Top Speed") return car.classNum >= 850 ? "R" : car.classNum >= 700 ? "S2" : "S1";
  if (build === "Off-Road" || build === "Rally") return car.classNum >= 720 ? "S1" : "A";
  if (car.classNum >= 900) return "R";
  if (car.classNum >= 760) return "S2";
  if (car.classNum >= 620) return "S1";
  if (car.classNum >= 500) return "A";
  return "B";
}

function clampTarget(car, target) {
  const options = nextClassesFrom(car.cls);
  return options.includes(target) ? target : options[options.length - 1] || car.cls;
}

function buildOptionsFor(car) {
  const options = nextClassesFrom(car.cls);
  return BUILD_TYPES.flatMap(build => options.map(cls => ({ build, cls, featured: cls === clampTarget(car, recommendedTarget(car, build)) })));
}

function driveBias(car, build) {
  const text = `${car.name} ${car.type}`.toLowerCase();
  if (build === "Drift") return "RWD";
  if (build === "Off-Road" || build === "Rally") return "AWD";
  if (text.includes("buggy") || text.includes("offroad") || text.includes("rally") || text.includes("wrx") || text.includes("evolution") || text.includes("gt-r")) return "AWD";
  if (build === "Top Speed" && car.classNum < 760) return "AWD";
  return "Stock / RWD preferred";
}

      alignment: { frontCamber: isDrift ? "-5.0°" : isDirt ? "-1.4°" : "-2.0°", rearCamber: isDrift ? "-1.0°" : isDirt ? "-0.8°" : "-1.5°", frontToe: isDrift ? "+1.2°" : "0.0°", rearToe: isDrift ? "-0.2°" : "0.0°", caster: isDrift ? "7.0°" : "6.5°" },
      antiRollBars: { front: isDrift ? "18.0" : isDirt ? "12.0" : "28.0", rear: isDrift ? "42.0" : isDirt ? "18.0" : "24.0" },
      springs: { front: isDirt ? "Soft: 40% slider" : isDrift ? "Medium-soft: 45% slider" : "Medium: 55% slider", rear: isDrift ? "Stiff: 70% slider" : isDirt ? "Soft: 38% slider" : "Medium: 52% slider", rideHeightFront: isDirt ? "High" : isSpeed ? "Low" : "Low-mid", rideHeightRear: isDirt ? "High" : isSpeed ? "Low + 1 click" : "Low-mid + 1 click" },
      damping: { frontRebound: isDirt ? "7.0" : "9.5", rearRebound: isDrift ? "11.5" : isDirt ? "7.5" : "9.0", frontBump: isDirt ? "3.5" : "5.5", rearBump: isDrift ? "6.2" : isDirt ? "3.8" : "5.0" },
      aero: { front: isSpeed ? "Minimum" : isDrift ? "N/A" : "60% slider", rear: isSpeed ? "Minimum + stability clicks" : isDrift ? "N/A" : "70% slider" },
      brakes: { balance: isDrift ? "48% front" : "52% front", pressure: isDrift ? "110%" : "105%" },
      differential: { frontAccel, frontDecel: drivetrain === "AWD" ? "5%" : "N/A", rearAccel: `${rearAccel}%`, rearDecel: `${rearDecel}%`, centerBalance: center },
    },
    notes: [
      "These are structured, exact baseline sheets generated from the car class/build type; test laps still matter.",
      "If the car understeers, reduce front ARB by 2 or add rear ARB by 2.",
      "If it oversteers on corner exit, lower rear differential acceleration by 5%."
    ]
  };
}

function App() {
  const [tab, setTab] = useState("home");
  const [search, setSearch] = useState("");
  const [classFilter, setClassFilter] = useState("All");
  const [buildFilter, setBuildFilter] = useState("Race");
  const [selected, setSelected] = useState(() => ({ car: CARS[0], build: "Race", targetClass: clampTarget(CARS[0], recommendedTarget(CARS[0], "Race")) }));
  const [comments, setComments] = useState([
    { id:1, user:"DriftKing_JP", car:"1994 Mazda MX-5 Miata", build:"Drift", text:"Angle kit plus softer front ARB made the car much smoother on transitions.", time:"2h ago", likes:14 },
    { id:2, user:"SpeedRunner99", car:"2023 Porsche 911 Turbo S", build:"Top Speed", text:"Lengthen 5th/6th and keep rear aero near minimum for highway pulls.", time:"5h ago", likes:28 },
    { id:3, user:"JDM_Guru", car:"2017 Nissan GT-R (R35)", build:"Race", text:"S1 AWD with rear-biased diff is the sweet spot for road racing.", time:"1d ago", likes:42 },
  ]);
  const [newComment, setNewComment] = useState({ user:"", car:"", build:"Race", text:"" });

  const makes = useMemo(() => new Set(CARS.map(c => c.make)).size, []);
  const dlcCount = useMemo(() => CARS.filter(c => c.src === "DLC" || c.dlc).length, []);
  const featured = useMemo(() => [...CARS].sort((a,b)=>b.classNum-a.classNum).slice(0,6), []);

  const filteredCars = useMemo(() => CARS.filter(car => {
    const q = search.toLowerCase().trim();
    const matchesSearch = !q || [car.name, car.make, car.type, car.country, car.src, car.dlc].join(" ").toLowerCase().includes(q);
    const matchesClass = classFilter === "All" || car.cls === classFilter;
    return matchesSearch && matchesClass;
  }), [search, classFilter]);

  const targetOptions = selected?.car ? nextClassesFrom(selected.car.cls) : [];
  const tune = selected?.car ? generateTune(selected.car, selected.build, selected.targetClass) : null;

  function openBuild(car, build = buildFilter, targetClass = null) {
    const safeTarget = clampTarget(car, targetClass || recommendedTarget(car, build));
    setSelected({ car, build, targetClass: safeTarget });
    setTab("builder");
  }

  function updateBuild(build) {
    const car = selected.car;
    setSelected({ car, build, targetClass: clampTarget(car, recommendedTarget(car, build)) });
  }

  function addComment() {
    if (!newComment.user.trim() || !newComment.text.trim()) return;
    setComments(prev => [{ id: Date.now(), user: newComment.user.trim(), car: newComment.car.trim() || "General", build: newComment.build, text: newComment.text.trim(), time: "Just now", likes: 0 }, ...prev]);
    setNewComment({ user:"", car:"", build:"Race", text:"" });
  }

  return (
    <div className="app-shell">
      <style>{css}</style>
      <header className="hero-nav">
        <div className="brand" onClick={() => setTab("home")}>
          <span className="brand-mark">FH</span>
          <div><strong>Tuning Hub</strong><small>Optimize Builds</small></div>
        </div>
        <nav>
          {[ ["home","Home"], ["garage","Garage"], ["builder","Tune Builder"], ["community","Community"] ].map(([key,label]) => (
            <button key={key} className={tab===key ? "active" : ""} onClick={() => setTab(key)}>{label}</button>
          ))}
        </nav>
      </header>

      <main>
        {tab === "home" && <Home cars={CARS.length} makes={makes} dlcCount={dlcCount} featured={featured} openBuild={openBuild} setTab={setTab} />}

        {tab === "garage" && <Garage cars={filteredCars} search={search} setSearch={setSearch} classFilter={classFilter} setClassFilter={setClassFilter} buildFilter={buildFilter} setBuildFilter={setBuildFilter} openBuild={openBuild} />}

        {tab === "builder" && selected?.car && <Builder selected={selected} setSelected={setSelected} targetOptions={targetOptions} tune={tune} updateBuild={updateBuild} />}

        {tab === "community" && <Community comments={comments} newComment={newComment} setNewComment={setNewComment} addComment={addComment} />}
      </main>
    </div>
  );
}

function Home({ cars, makes, dlcCount, featured, openBuild, setTab }) {
  return <section className="landing-v2">
    <div className="landing-hero panel">
      <div className="hero-kicker"><span></span> FH Build Studio</div>
      <h1>Pick a car. Choose the vibe. Get the build.</h1>
      <p>Cleaner, darker, more cinematic: this version makes the home page feel like a proper tuning studio instead of a stats dashboard.</p>
      <div className="hero-actions">
        <button className="primary" onClick={() => setTab("garage")}>Browse Garage</button>
        <button className="ghost" onClick={() => setTab("builder")}>Open Current Build</button>
      </div>
      <div className="quick-stats">
        <span><strong>{cars}</strong> cars</span>
        <span><strong>{makes}</strong> makes</span>
        <span><strong>5</strong> build styles</span>
        <span><strong>{dlcCount}</strong> DLC/special</span>
      </div>
    </div>

    <div className="studio-card panel grip-card">
      <p className="eyebrow">Recommended mood</p>
      <h2>All-around grip builds</h2>
      <p>Balanced race setups for cars like the Ferrari FXX-K Evo: high corner speed, stable braking, clean exits, and confidence on technical circuits.</p>
      <button className="ghost wide" onClick={() => setTab("garage")}>Find a Grip Car</button>
    </div>

    <div className="build-lanes">
      {BUILD_TYPES.map(type => <button key={type} className="lane-card" onClick={() => setTab("garage")}>
        <span>{BUILD_META[type].icon}</span>
        <strong>{type}</strong>
        <small>{BUILD_META[type].tag}</small>
      </button>)}
    </div>

    <div className="panel span-wide">
      <div className="section-title">Featured builds to start with</div>
      <div className="featured-grid editorial-grid">{featured.map((car, i) => <CarMini key={car.name} car={car} onClick={() => openBuild(car, i % 2 ? "Top Speed" : "Race")} />)}</div>
    </div>
  </section>;
}

function Garage({ cars, search, setSearch, classFilter, setClassFilter, buildFilter, setBuildFilter, openBuild }) {
  return <section>
    <div className="toolbar panel">
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search car, make, type, country, DLC..." />
      <div className="chip-row">
        {["All", ...CLASS_ORDER].map(cls => <button key={cls} onClick={()=>setClassFilter(cls)} className={classFilter===cls ? "chip active" : "chip"} style={cls!=="All" ? {"--accent": classColor(cls)} : {}}>{cls}</button>)}
      </div>
      <div className="chip-row">{BUILD_TYPES.map(b => <button key={b} onClick={()=>setBuildFilter(b)} className={buildFilter===b ? "chip active red" : "chip"}>{BUILD_META[b].icon} {b}</button>)}</div>
    </div>
    <div className="garage-count">{cars.length} cars shown · click a card for a {buildFilter} build</div>
    <div className="car-grid">{cars.map(car => <CarCard key={car.name} car={car} build={buildFilter} openBuild={openBuild} />)}</div>
  </section>;
}

function Builder({ selected, setSelected, targetOptions, tune, updateBuild }) {
  const { car, build, targetClass } = selected;
  return <section className="builder-layout">
    <aside className="panel sticky-card">
      <p className="eyebrow">Selected build</p>
      <h2>{car.name}</h2>
      <div className="meta-line">{car.type} · {car.country} · {car.src}{car.dlc ? ` · ${car.dlc}` : ""}</div>
      <div className="pill-row"><ClassPill cls={car.cls} pi={car.classNum}/><span className="soft-pill">Target {tune.targetPI}</span></div>
      <label>Build type</label>
      <div className="stacked-buttons">{BUILD_TYPES.map(b => <button key={b} className={build===b ? "active" : ""} onClick={()=>updateBuild(b)}>{BUILD_META[b].icon} {b}</button>)}</div>
      <label>Target class</label>
      <select value={targetClass} onChange={e=>setSelected(s => ({...s, targetClass: e.target.value}))}>{targetOptions.map(cls => <option key={cls} value={cls}>{cls} — {CLASS_RANGES[cls].label}</option>)}</select>
      <div className="build-count">Available for this car: {buildOptionsFor(car).length} build/class combinations</div>
    </aside>
    <div>
      <div className="panel tune-hero"><p className="eyebrow">{build} blueprint</p><h2>{tune.summary}</h2></div>
      <RecommendationPanel recommendation={getBuildRecommendation(car, build, targetClass)} />
      <div className="two-col">
        <Parts title="Parts to buy" groups={tune.parts} />
        <Settings title="Exact tune settings" data={tune.settings} />
      </div>
      <div className="panel"><div className="section-title">Fine-tuning notes</div>{tune.notes.map(n => <p className="note" key={n}>› {n}</p>)}</div>
    </div>
  </section>;
}

function Community({ comments, newComment, setNewComment, addComment }) {
  return <section className="community-layout">
    <div className="panel"><div className="section-title">Share your build tips</div><div className="form-grid"><input placeholder="Gamertag" value={newComment.user} onChange={e=>setNewComment(p=>({...p,user:e.target.value}))}/><input placeholder="Car name optional" value={newComment.car} onChange={e=>setNewComment(p=>({...p,car:e.target.value}))}/></div><select value={newComment.build} onChange={e=>setNewComment(p=>({...p,build:e.target.value}))}>{BUILD_TYPES.map(b=><option key={b}>{b}</option>)}</select><textarea placeholder="Share tune settings, part choices, or driving notes..." value={newComment.text} onChange={e=>setNewComment(p=>({...p,text:e.target.value}))}/><button className="primary" onClick={addComment}>Post Tip</button></div>
    <div>{comments.map(c => <article className="comment" key={c.id}><div><strong>{c.user}</strong><span>{c.time}</span></div><small>{c.car} · {c.build}</small><p>{c.text}</p><em>♥ {c.likes}</em></article>)}</div>
  </section>;
}

function Stat({ label, value }) { return <div className="stat panel"><strong>{value}</strong><span>{label}</span></div>; }
function ClassPill({ cls, pi }) { return <span className="class-pill" style={{color:classColor(cls), borderColor:classColor(cls), background:CLASS_RANGES[cls]?.bg}}>{cls} {pi}</span>; }
function CarMini({ car, onClick }) { return <button className="mini-card" onClick={onClick}><ClassPill cls={car.cls} pi={car.classNum}/><strong>{car.name}</strong><span>{car.type}</span></button>; }
function CarCard({ car, build, openBuild }) { const options = buildOptionsFor(car); return <article className="car-card" onClick={()=>openBuild(car, build)}><div><strong>{car.name}</strong><ClassPill cls={car.cls} pi={car.classNum}/></div><p>{car.type} · {car.country}</p><div className="card-foot"><span>{options.length} build paths</span><button onClick={(e)=>{e.stopPropagation(); openBuild(car, build);}}>Build {build}</button></div></article>; }

function RecommendationPanel({ recommendation }) { return <div className="panel recommend-panel">
  <div>
    <div className="section-title">Recommended for this build</div>
    <h2>{recommendation.title}</h2>
    <p>{recommendation.why}</p>
    <div className="best-for"><strong>Best for:</strong> {recommendation.bestFor}</div>
  </div>
  <div className="priority-list">{recommendation.priorities.map(item => <span key={item}>★ {item}</span>)}</div>
</div>; }
function Parts({ title, groups }) { return <div className="panel"><div className="section-title">{title}</div>{Object.entries(groups).map(([group, items]) => <div className="part-group" key={group}><h3>{group}</h3>{items.map(item => <p key={item}>✓ {item}</p>)}</div>)}</div>; }
function Settings({ title, data }) { return <div className="panel"><div className="section-title">{title}</div>{Object.entries(data).map(([group, values]) => <div className="setting-group" key={group}><h3>{group}</h3>{Object.entries(values).map(([k,v]) => <div className="setting-row" key={k}><span>{k.replace(/([A-Z])/g," $1")}</span><strong>{v}</strong></div>)}</div>)}</div>; }
